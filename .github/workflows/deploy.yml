name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/sginf
            git pull
            .venv/bin/pip install -r requirements.txt -q
            DOMAIN="${DOMAIN:-sginf.gob.org.br}"
            CERT_SRC="/etc/letsencrypt/live/$DOMAIN"
            if [ -d "$CERT_SRC" ]; then
              sudo certbot renew --non-interactive --deploy-hook "cp $CERT_SRC/fullchain.pem ssl/cert.pem && cp $CERT_SRC/privkey.pem ssl/key.pem"
            fi
            if ! grep -q "Environment=RP_ID=" /etc/systemd/system/sginf.service 2>/dev/null; then
              sudo sed -i "/^\[Service\]/a Environment=RP_ID=$DOMAIN" /etc/systemd/system/sginf.service
              sudo systemctl daemon-reload
            fi
            sudo systemctl restart sginf
