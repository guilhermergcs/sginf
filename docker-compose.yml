services:
  web:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DATABASE_PATH=/app/data/gestao_ti.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
