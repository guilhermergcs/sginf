<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressoras - Gerenciamento de TI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sidebar: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-active: #0f3460;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --bg: #f0f2f5;
            --surface: #fff;
            --ink: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }
        html, body { height: 100%; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); display: flex; }
        .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
        .sidebar-header span { display: block; font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
        .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
        .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        .sidebar-nav a:hover { background: var(--sidebar-hover); color: #fff; }
        .sidebar-nav a.active { background: var(--sidebar-active); color: var(--accent-light); }
        .sidebar-nav a .icon { font-size: 18px; width: 22px; text-align: center; }
        .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 22px; font-weight: 700; }
        .page-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }
        .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-success { background: #059669; color: #fff; }
        .btn-success:hover:not(:disabled) { background: #047857; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #b91c1c; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .status-msg { font-size: 13px; color: var(--muted); margin-left: 4px; }
        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 24px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-header h3 { font-size: 15px; font-weight: 600; }
        .card-body { padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 20px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); background: #fafafa; }
        td { padding: 10px 20px; font-size: 13px; border-bottom: 1px solid #f3f4f6; }
        tr:hover td { background: #f9fafb; }
        .ok { color: #059669; font-weight: 600; }
        .ok::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #059669; margin-right: 6px; vertical-align: middle; }
        .offline { color: #dc2626; font-weight: 600; }
        .offline::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #dc2626; margin-right: 6px; vertical-align: middle; }
        .table-wrap { overflow-x: auto; }
        .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
        .loading .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-inline { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        .spinner-inline.visible { display: inline-block; }
        .summary { display: flex; gap: 16px; margin-bottom: 20px; }
        .stat { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; flex: 1; }
        .stat .num { font-size: 24px; font-weight: 700; }
        .stat .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .form-cadastro { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
        .form-cadastro .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-cadastro label { font-size: 12px; font-weight: 600; color: var(--muted); }
        .form-cadastro input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; font-family: inherit; }
        .form-cadastro input:focus { border-color: var(--accent); }
        .modelo-tag { display: inline-block; font-size: 12px; color: var(--muted); }
        .ult-verif { font-size: 11px; color: var(--muted); }
        @media (max-width: 700px) { .sidebar { width: 60px; } .sidebar-header h1, .sidebar-header span, .sidebar-nav a span { display: none; } .sidebar-nav a { justify-content: center; padding: 10px; } .main { margin-left: 60px; padding: 16px; } .summary { flex-direction: column; } .form-cadastro { flex-direction: column; } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>Gestão TI</h1>
            <span>Painel Administrativo</span>
        </div>
        <div class="sidebar-nav">
            <a href="/computadores"><span class="icon">🖥️</span><span>Computadores</span></a>
            <a href="/impressoras" class="active"><span class="icon">🖨️</span><span>Impressoras</span></a>
            <a href="/usuarios"><span class="icon">👤</span><span>Usuários</span></a>
            <a href="/config"><span class="icon">⚙️</span><span>Configuração AD</span></a>
        </div>
    </nav>

    <div class="main">
        <div class="page-header">
            <h2>Impressoras</h2>
            <p>Monitoramento de impressoras via SNMP</p>
        </div>

        <div class="summary" id="summary">
            <div class="stat"><div class="num" id="total-print">-</div><div class="label">Total</div></div>
            <div class="stat"><div class="num" id="ok-print" style="color:#059669">-</div><div class="label">OK</div></div>
            <div class="stat"><div class="num" id="offline-print" style="color:#dc2626">-</div><div class="label">Offline</div></div>
        </div>

        <div class="card">
            <div class="card-header"><h3>Adicionar Impressora</h3></div>
            <div class="card-body">
                <form class="form-cadastro" id="form-add">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="add-nome" placeholder="Ex: HP Laserjet 1" required>
                    </div>
                    <div class="form-group">
                        <label>IP</label>
                        <input type="text" id="add-ip" placeholder="192.168.1.100" required>
                    </div>
                    <div class="form-group">
                        <label>Comunidade SNMP</label>
                        <input type="text" id="add-comunidade" placeholder="public" value="public">
                    </div>
                    <button type="submit" class="btn btn-success" id="btn-add">+ Adicionar</button>
                </form>
            </div>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" id="btn-sync">📡 Verificar via SNMP</button>
            <span class="status-msg" id="sync-status"></span>
        </div>

        <div class="card">
            <div class="card-header"><h3>Impressoras Cadastradas</h3></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>IP</th>
                            <th>Modelo</th>
                            <th>Status</th>
                            <th>Última Verif.</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tab-impressoras">
                        <tr><td colspan="6" class="loading"><span class="spinner"></span>Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function $(id) { return document.getElementById(id); }
        const tbody = $('tab-impressoras');
        const statusMsg = $('sync-status');

        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.innerHTML = loading ? '<span class="spinner-inline visible"></span> Aguarde...' : btn.dataset.text;
        }
        function showStatus(msg, ok) {
            statusMsg.textContent = msg;
            statusMsg.style.color = ok ? '#059669' : '#dc2626';
        }

        async function carregar() {
            try {
                const resp = await fetch('/api/impressoras');
                const dados = await resp.json();
                const total = dados.length;
                const online = dados.filter(d => d.status === 'ok').length;
                $('total-print').textContent = total;
                $('ok-print').textContent = online;
                $('offline-print').textContent = total - online;

                tbody.innerHTML = total ? '' : '<tr><td colspan="6" class="loading">Nenhuma impressora cadastrada</td></tr>';
                dados.forEach(p => {
                    const linha = document.createElement('tr');
                    linha.innerHTML = `
                        <td><strong>${p.nome}</strong></td>
                        <td style="font-family:monospace;font-size:12px;color:var(--muted)">${p.ip}</td>
                        <td><span class="modelo-tag">${p.modelo || '-'}</span></td>
                        <td><span class="${p.status === 'ok' ? 'ok' : 'offline'}">${p.status}</span></td>
                        <td class="ult-verif">${p.ultima_verificacao || '-'}</td>
                        <td><button class="btn btn-danger btn-sm btn-remover" data-id="${p.id}" data-nome="${p.nome}">Remover</button></td>
                    `;
                    tbody.appendChild(linha);
                });

                document.querySelectorAll('.btn-remover').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm(`Remover impressora "${btn.dataset.nome}"?`)) return;
                        const resp = await fetch(`/api/impressoras/remover/${btn.dataset.id}`, { method: 'DELETE' });
                        const r = await resp.json();
                        if (resp.ok) carregar();
                        showStatus(r.message, resp.ok);
                    });
                });
            } catch {
                tbody.innerHTML = '<tr><td colspan="6" class="loading" style="color:#dc2626">Erro ao carregar</td></tr>';
            }
        }

        async function sincronizar() {
            const btn = $('btn-sync');
            btn.dataset.text = btn.innerHTML;
            setLoading(btn, true);
            showStatus('Verificando impressoras via SNMP...');
            try {
                const resp = await fetch('/api/sync/impressoras', { method: 'POST' });
                const r = await resp.json();
                showStatus(r.message, resp.ok);
                if (resp.ok) carregar();
            } catch { showStatus('Erro de rede', false); }
            finally { setLoading(btn, false); }
        }

        $('btn-sync').addEventListener('click', sincronizar);

        $('form-add').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('btn-add');
            const data = {
                nome: $('add-nome').value,
                ip: $('add-ip').value,
                comunidade_snmp: $('add-comunidade').value
            };
            btn.disabled = true;
            btn.textContent = 'Adicionando...';
            try {
                const resp = await fetch('/api/impressoras/adicionar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const r = await resp.json();
                showStatus(r.message, resp.ok);
                if (resp.ok) {
                    $('add-nome').value = '';
                    $('add-ip').value = '';
                    $('add-comunidade').value = 'public';
                    carregar();
                }
            } catch { showStatus('Erro de rede', false); }
            finally { btn.disabled = false; btn.textContent = '+ Adicionar'; }
        });

        window.addEventListener('DOMContentLoaded', carregar);
    </script>
</body>
</html>
