<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - Gerenciamento de TI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sidebar: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-active: #0f3460;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --bg: #f0f2f5;
            --surface: #fff;
            --ink: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }
        html, body { height: 100%; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); display: flex; }
        .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
        .sidebar-header span { display: block; font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
        .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
        .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        .sidebar-nav a:hover { background: var(--sidebar-hover); color: #fff; }
        .sidebar-nav a.active { background: var(--sidebar-active); color: var(--accent-light); }
        .sidebar-nav a .icon { font-size: 18px; width: 22px; text-align: center; }
        .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 22px; font-weight: 700; }
        .page-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }
        .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-success { background: #059669; color: #fff; }
        .btn-success:hover:not(:disabled) { background: #047857; }
        .btn-warning { background: #d97706; color: #fff; }
        .btn-warning:hover:not(:disabled) { background: #b45309; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #b91c1c; }
        .status-msg { font-size: 13px; color: var(--muted); margin-left: 4px; }
        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .card-header h3 { font-size: 15px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 20px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); background: #fafafa; }
        td { padding: 10px 20px; font-size: 13px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tr:hover td { background: #f9fafb; }
        .ativo { color: #059669; font-weight: 600; }
        .ativo::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #059669; margin-right: 6px; }
        .inativo { color: #dc2626; font-weight: 600; }
        .inativo::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #dc2626; margin-right: 6px; }
        .table-wrap { overflow-x: auto; }
        .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
        .loading .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-inline { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        .spinner-inline.visible { display: inline-block; }
        .summary { display: flex; gap: 16px; margin-bottom: 20px; }
        .stat { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; flex: 1; }
        .stat .num { font-size: 24px; font-weight: 700; }
        .stat .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .actions { display: flex; gap: 6px; }
        @media (max-width: 700px) { .sidebar { width: 60px; } .sidebar-header h1, .sidebar-header span, .sidebar-nav a span { display: none; } .sidebar-nav a { justify-content: center; padding: 10px; } .main { margin-left: 60px; padding: 16px; } .summary { flex-direction: column; } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>Gestão TI</h1>
            <span>Painel Administrativo</span>
        </div>
        <div class="sidebar-nav">
            <a href="/computadores"><span class="icon">🖥️</span><span>Computadores</span></a>
            <a href="/impressoras"><span class="icon">🖨️</span><span>Impressoras</span></a>
            <a href="/usuarios" class="active"><span class="icon">👤</span><span>Usuários</span></a>
            <a href="/config"><span class="icon">⚙️</span><span>Configuração AD</span></a>
        </div>
    </nav>

    <div class="main">
        <div class="page-header">
            <h2>Usuários do AD</h2>
            <p>Lista de usuários do Active Directory</p>
        </div>

        <div class="summary" id="summary">
            <div class="stat"><div class="num" id="total-usuarios">-</div><div class="label">Total</div></div>
            <div class="stat"><div class="num" id="ativos-usuarios" style="color:#059669">-</div><div class="label">Ativos</div></div>
            <div class="stat"><div class="num" id="inativos-usuarios" style="color:#dc2626">-</div><div class="label">Inativos</div></div>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" id="btn-carregar">🔄 Carregar Usuários</button>
            <span class="status-msg" id="sync-status"></span>
        </div>

        <div class="card">
            <div class="card-header"><h3>Usuários</h3></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Login</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tab-usuarios">
                        <tr><td colspan="4" class="loading"><span class="spinner"></span>Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function $(id) { return document.getElementById(id); }
        const tbody = $('tab-usuarios');
        const statusMsg = $('sync-status');

        function showStatus(msg, ok) {
            statusMsg.textContent = msg;
            statusMsg.style.color = ok ? '#059669' : '#dc2626';
        }

        async function carregar() {
            const btn = $('btn-carregar');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-inline visible"></span> Carregando...';
            showStatus('Carregando usuários...');
            try {
                const resp = await fetch('/api/usuarios');
                const r = await resp.json();
                if (!resp.ok) { showStatus(r.message, false); return; }
                const dados = r.dados;
                const total = dados.length;
                const ativos = dados.filter(d => d.status === 'ativo').length;
                $('total-usuarios').textContent = total;
                $('ativos-usuarios').textContent = ativos;
                $('inativos-usuarios').textContent = total - ativos;

                tbody.innerHTML = total ? '' : '<tr><td colspan="4" class="loading">Nenhum usuário encontrado.</td></tr>';
                dados.forEach(u => {
                    const linha = document.createElement('tr');
                    const acao = u.status === 'ativo'
                        ? `<button class="btn btn-warning btn-sm" onclick="desativar('${u.login}')">🔒 Desativar</button>`
                        : `<button class="btn btn-success btn-sm" onclick="ativar('${u.login}')">🔓 Ativar</button>`;
                    linha.innerHTML = `
                        <td><strong>${u.nome}</strong></td>
                        <td style="font-family:monospace;font-size:12px;color:var(--muted)">${u.login}</td>
                        <td><span class="${u.status}">${u.status}</span></td>
                        <td><div class="actions">${acao}</div></td>
                    `;
                    tbody.appendChild(linha);
                });
                showStatus(`${total} usuários carregados`, true);
            } catch {
                tbody.innerHTML = '<tr><td colspan="4" class="loading" style="color:#dc2626">Erro ao carregar</td></tr>';
                showStatus('Erro de rede', false);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔄 Carregar Usuários';
            }
        }

        async function ativar(login) {
            if (!confirm(`Ativar usuário ${login}?`)) return;
            try {
                const resp = await fetch('/api/usuarios/ativar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({login})
                });
                const r = await resp.json();
                showStatus(r.message, resp.ok);
                if (resp.ok) carregar();
            } catch { showStatus('Erro de rede', false); }
        }

        async function desativar(login) {
            if (!confirm(`Desativar usuário ${login}?`)) return;
            try {
                const resp = await fetch('/api/usuarios/desativar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({login})
                });
                const r = await resp.json();
                showStatus(r.message, resp.ok);
                if (resp.ok) carregar();
            } catch { showStatus('Erro de rede', false); }
        }

        $('btn-carregar').addEventListener('click', carregar);
        window.addEventListener('DOMContentLoaded', carregar);
    </script>
</body>
</html>
